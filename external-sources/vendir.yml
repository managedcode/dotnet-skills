apiVersion: vendir.k14s.io/v1alpha1
kind: Config
directories:
  - path: upstreams
    contents:
      - path: dotnet-skills
        git:
          url: https://github.com/dotnet/skills
          ref: origin/main
        newRootPath: plugins
      - path: webgpu-claude-skill
        git:
          url: https://github.com/dgreenheck/webgpu-claude-skill
          ref: origin/main
      - path: astro
        git:
          url: https://github.com/withastro/astro
          ref: origin/main
        includePaths:
          - .agents/skills/astro-developer/**/*
          - packages/astro/package.json
